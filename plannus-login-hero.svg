    <rect x="898" y="216" width="54" height="18" rx="9" fill="#B1B3B3" opacity=".45"/>
    <rect x="844" y="244" width="96" height="10" rx="5" fill="#F5F6F6" opacity=".85"/>

    <rect x="1182" y="314" width="74" height="14" rx="7" fill="#101820"/>
