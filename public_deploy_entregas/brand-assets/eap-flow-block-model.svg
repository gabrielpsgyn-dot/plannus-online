<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F5F6F6"/>
  <defs>
    <linearGradient id="rail" x1="120" y1="500" x2="1480" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D9DEDF"/>
      <stop offset="1" stop-color="#C8CED0"/>
    </linearGradient>
    <filter id="cardShadow" x="-60" y="-60" width="420" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#101820" flood-opacity="0.10"/>
    </filter>
    <filter id="softGlow" x="-80" y="-80" width="500" height="380" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="26" flood-color="#101820" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- layout guides -->
  <g opacity="1">
    <rect x="64" y="62" width="1472" height="776" rx="24" fill="#FFFFFF" stroke="#B1B3B3" stroke-width="1.8"/>
    <path d="M104 150H1496" stroke="#E4E7E8" stroke-width="1.5"/>
    <path d="M104 784H1496" stroke="#E4E7E8" stroke-width="1.5"/>
  </g>

  <!-- title -->
  <text x="88" y="108" fill="#101820" font-family="Inter, Space Grotesk, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="1.2">MODELO DO OBJETO DA EAP</text>
  <text x="88" y="138" fill="#5F666A" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400">Card padrão para as raias do fluxo visual. Nome, borda, camada superior e conexões visíveis.</text>

  <!-- rail label -->
  <g transform="translate(112,238)">
    <rect x="0" y="0" width="94" height="30" rx="15" fill="#FFFFFF" stroke="#B1B3B3" stroke-width="1.6"/>
    <text x="18" y="20" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">RAIA 1</text>
  </g>

  <!-- rail -->
  <line x1="104" y1="482" x2="1496" y2="482" stroke="url(#rail)" stroke-width="3"/>

  <!-- card 1 -->
  <g filter="url(#cardShadow)">
    <g transform="translate(112,300)">
      <rect x="0" y="0" width="286" height="160" rx="24" fill="#FFFFFF" stroke="#101820" stroke-width="2.4"/>
      <rect x="8" y="8" width="270" height="144" rx="20" fill="none" stroke="#E4E7E8" stroke-width="1.2"/>
      <rect x="18" y="14" width="74" height="24" rx="12" fill="#FFFFFF" stroke="#B1B3B3" stroke-width="1.6"/>
      <text x="32" y="31" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">RAIA 1</text>
      <rect x="0" y="0" width="8" height="160" rx="4" fill="#D50032"/>
      <circle cx="18" cy="82" r="6" fill="#101820"/>
      <circle cx="268" cy="82" r="6" fill="#D50032"/>
      <rect x="22" y="114" width="88" height="22" rx="11" fill="#F5F6F6" stroke="#B1B3B3" stroke-width="1.2"/>
      <text x="40" y="107" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">RAIA 1</text>
      <text x="40" y="60" fill="#5F666A" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.4">NOME DO SERVIÇO</text>
      <text x="40" y="88" fill="#101820" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="0.1">ALVENARIA</text>
      <text x="40" y="112" fill="#101820" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="0.1">INTERNA</text>
      <path d="M278 82H352" stroke="#5F666A" stroke-width="4.5" stroke-linecap="round"/>
      <polygon points="356,82 340,72 340,92" fill="#5F666A"/>
      <g transform="translate(242,12)">
        <circle cx="14" cy="14" r="14" fill="#FFFFFF" stroke="#E4E7E8"/>
        <text x="10" y="18" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">×</text>
      </g>
    </g>
  </g>

  <!-- card 2 -->
  <g filter="url(#cardShadow)">
    <g transform="translate(432,300)">
      <rect x="0" y="0" width="286" height="160" rx="24" fill="#FFFFFF" stroke="#101820" stroke-width="2.4"/>
      <rect x="8" y="8" width="270" height="144" rx="20" fill="none" stroke="#E4E7E8" stroke-width="1.2"/>
      <rect x="18" y="14" width="74" height="24" rx="12" fill="#FFFFFF" stroke="#B1B3B3" stroke-width="1.6"/>
      <text x="32" y="31" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">RAIA 1</text>
      <rect x="0" y="0" width="8" height="160" rx="4" fill="#101820"/>
      <circle cx="18" cy="82" r="6" fill="#101820"/>
      <circle cx="268" cy="82" r="6" fill="#D50032"/>
      <rect x="22" y="114" width="88" height="22" rx="11" fill="#F5F6F6" stroke="#B1B3B3" stroke-width="1.2"/>
      <text x="40" y="107" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">RAIA 1</text>
      <text x="40" y="60" fill="#5F666A" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.4">NOME DO SERVIÇO</text>
      <text x="40" y="88" fill="#101820" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="0.1">TALISCA</text>
      <path d="M278 82H352" stroke="#5F666A" stroke-width="4.5" stroke-linecap="round"/>
      <polygon points="356,82 340,72 340,92" fill="#5F666A"/>
      <g transform="translate(242,12)">
        <circle cx="14" cy="14" r="14" fill="#FFFFFF" stroke="#E4E7E8"/>
        <text x="10" y="18" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">×</text>
      </g>
    </g>
  </g>

  <!-- card 3 -->
  <g filter="url(#cardShadow)">
    <g transform="translate(752,300)">
      <rect x="0" y="0" width="286" height="160" rx="24" fill="#FFFFFF" stroke="#101820" stroke-width="2.4"/>
      <rect x="8" y="8" width="270" height="144" rx="20" fill="none" stroke="#E4E7E8" stroke-width="1.2"/>
      <rect x="18" y="14" width="74" height="24" rx="12" fill="#FFFFFF" stroke="#B1B3B3" stroke-width="1.6"/>
      <text x="32" y="31" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">RAIA 1</text>
      <rect x="0" y="0" width="8" height="160" rx="4" fill="#101820"/>
      <circle cx="18" cy="82" r="6" fill="#101820"/>
      <circle cx="268" cy="82" r="6" fill="#D50032"/>
      <rect x="22" y="114" width="88" height="22" rx="11" fill="#F5F6F6" stroke="#B1B3B3" stroke-width="1.2"/>
      <text x="40" y="107" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">RAIA 1</text>
      <text x="40" y="60" fill="#5F666A" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.4">NOME DO SERVIÇO</text>
      <text x="40" y="88" fill="#101820" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="0.1">CONTRAMARCO</text>
      <path d="M278 82H352" stroke="#5F666A" stroke-width="4.5" stroke-linecap="round"/>
      <polygon points="356,82 340,72 340,92" fill="#5F666A"/>
      <g transform="translate(242,12)">
        <circle cx="14" cy="14" r="14" fill="#FFFFFF" stroke="#E4E7E8"/>
        <text x="10" y="18" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">×</text>
      </g>
    </g>
  </g>

  <!-- tiny handles on the rails -->
  <circle cx="120" cy="410" r="4.5" fill="#101820"/>
  <circle cx="398" cy="410" r="4.5" fill="#D50032"/>
  <circle cx="440" cy="410" r="4.5" fill="#101820"/>
  <circle cx="718" cy="410" r="4.5" fill="#D50032"/>
  <circle cx="760" cy="410" r="4.5" fill="#101820"/>
  <circle cx="1038" cy="410" r="4.5" fill="#D50032"/>

  <!-- annotation block -->
  <g transform="translate(112,604)" filter="url(#softGlow)">
    <rect x="0" y="0" width="540" height="128" rx="20" fill="#FFFFFF" stroke="#B1B3B3" stroke-width="2.2"/>
    <text x="24" y="34" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Padrão do objeto</text>
    <text x="24" y="60" fill="#5F666A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400">Card com borda leve, chip de raia, nome do serviço em destaque e conexões discretas.</text>
    <text x="24" y="86" fill="#5F666A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400">A camada visual precisa ficar explícita: borda, título, chip e handles separados do conteúdo.</text>
    <rect x="24" y="96" width="116" height="10" rx="5" fill="#D50032"/>
    <rect x="150" y="96" width="116" height="10" rx="5" fill="#101820"/>
    <rect x="276" y="96" width="116" height="10" rx="5" fill="#B1B3B3"/>
  </g>
</svg>
